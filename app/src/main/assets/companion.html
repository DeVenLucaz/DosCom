<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <script type="module" src="model-viewer.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: transparent !important;
            overflow: hidden;
        }
        model-viewer {
            width: 100%;
            height: 100%;
            background-color: transparent !important;
            --poster-color: transparent;
            /* Disable user interaction but keep the model visible */
            pointer-events: none;
        }
    </style>
</head>
<body>
    <model-viewer 
        id="alien" 
        src="Alien.glb" 
        camera-controls="false"
        disable-zoom 
        disable-pan 
        disable-tap
        interaction-prompt="none" 
        shadow-intensity="1"
        environment-image="neutral"
        autoplay
        camera-orbit="0deg 90deg auto">
    </model-viewer>

    <script>
        const viewer = document.querySelector('#alien');

        function hexToRgb(hex) {
            var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? [
                parseInt(result[1], 16) / 255.0,
                parseInt(result[2], 16) / 255.0,
                parseInt(result[3], 16) / 255.0,
                1.0
            ] : [1, 1, 1, 1];
        }

        function setColors(bodyHex, eyeHex) {
            if (!viewer.model) return;
            const materials = viewer.model.materials;
            for (let mat of materials) {
                let name = mat.name.toLowerCase();
                if (name.includes('eye')) {
                    mat.pbrMetallicRoughness.setBaseColorFactor(hexToRgb(eyeHex));
                    mat.setEmissiveFactor(hexToRgb(eyeHex));
                } else if (name.includes('body') || name.includes('skin')) {
                    mat.pbrMetallicRoughness.setBaseColorFactor(hexToRgb(bodyHex));
                }
            }
        }

        // Exposed to Android WebView
        window.applyColors = function(bodyHex, eyeHex) {
            // Apply immediately if loaded
            setColors(bodyHex, eyeHex);
            // And apply when loaded
            viewer.addEventListener('load', () => setColors(bodyHex, eyeHex));
        };

        window.updateTransforms = function(scaleX, scaleY, rotationDeg) {
            // Adjust scale using CSS for fast updates
            // And rotate the model using CSS transform or camera orbit
            viewer.style.transform = `scale(${scaleX}, ${scaleY})`;
            viewer.cameraOrbit = `${rotationDeg}deg 90deg auto`;
        };
    </script>
</body>
</html>
