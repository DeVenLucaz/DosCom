<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <script src="model-viewer.min.js" type="module"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: transparent !important;
            overflow: hidden;
        }
        model-viewer {
            width: 100%;
            height: 100%;
            background-color: transparent !important;
            --poster-color: transparent;
            pointer-events: none;
            /* Default transform */
            transform-origin: center center;
        }
    </style>
</head>
<body>
    <model-viewer 
        id="alien" 
        src="Rig_Medium_General.glb" 
        camera-controls="false"
        disable-zoom 
        disable-pan 
        disable-tap
        interaction-prompt="none" 
        shadow-intensity="1"
        environment-image="neutral"
        autoplay
        animation-name="Idle_A"
        camera-orbit="0deg 90deg auto">
    </model-viewer>

    <script>
        const viewer = document.querySelector('#alien');

        function hexToRgb(hex) {
            var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? [
                parseInt(result[1], 16) / 255.0,
                parseInt(result[2], 16) / 255.0,
                parseInt(result[3], 16) / 255.0,
                1.0
            ] : [1, 1, 1, 1];
        }

        function setColors(bodyHex, eyeHex) {
            if (!viewer.model) return;
            const materials = viewer.model.materials;
            for (let mat of materials) {
                let name = mat.name.toLowerCase();
                if (name.includes('eye')) {
                    mat.pbrMetallicRoughness.setBaseColorFactor(hexToRgb(eyeHex));
                    mat.setEmissiveFactor(hexToRgb(eyeHex));
                } else if (name.includes('body') || name.includes('skin') || name.includes('character_material')) {
                    mat.pbrMetallicRoughness.setBaseColorFactor(hexToRgb(bodyHex));
                }
            }
        }

        window.applyColors = function(bodyHex, eyeHex) {
            setColors(bodyHex, eyeHex);
            viewer.addEventListener('load', () => setColors(bodyHex, eyeHex));
        };

        window.updateTransforms = function(scaleX, scaleY, rotationDeg, rotationYDeg) {
            // Apply 2D stretch/squash and wobble (Z-axis rotation)
            viewer.style.transform = `scale(${scaleX}, ${scaleY}) rotateZ(${rotationDeg}deg)`;
            // Orbit the camera to view the model from different sides
            viewer.cameraOrbit = `${-rotationYDeg}deg 90deg auto`;
        };

        let animMap = {};
        fetch('animation_map.json')
            .then(r => r.json())
            .then(data => { animMap = data; });

        // Switch GLB source if needed for the given animation
        function ensureGlbLoaded(animName) {
            if (animMap[animName]) {
                const targetSrc = animMap[animName];
                if (!viewer.src || !viewer.src.endsWith(targetSrc)) {
                    viewer.src = targetSrc;
                }
            }
        }

        // Play animation in a loop (default behavior)
        window.updateAnimation = function(animName) {
            ensureGlbLoaded(animName);
            viewer.setAttribute('autoplay', '');
            if (viewer.animationName !== animName) {
                viewer.animationName = animName;
            }
        };

        // Play animation once then freeze on last frame
        window.playOnce = function(animName) {
            ensureGlbLoaded(animName);
            if (viewer.animationName !== animName) {
                viewer.animationName = animName;
            }
            // Restart from beginning
            if (viewer.currentTime !== undefined) {
                viewer.currentTime = 0;
            }
            viewer.setAttribute('autoplay', '');
            
            // Listen for the animation to finish, then pause
            const onFinished = () => {
                viewer.pause();
                viewer.removeEventListener('finished', onFinished);
            };
            viewer.removeEventListener('finished', onFinished);
            viewer.addEventListener('finished', onFinished);
        };
    </script>
</body>
</html>
